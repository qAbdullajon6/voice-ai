services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voiceai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voiceai}
      POSTGRES_DB: ${POSTGRES_DB:-voiceai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  postgres_data:
