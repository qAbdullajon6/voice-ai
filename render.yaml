services:
  # 1. Next.js Frontend (Web Interfeys)
  - type: web
    name: voice-ai-web
    env: node
    buildCommand: npm install && npm run build --workspace=web
    startCommand: npm run start --workspace=web
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: voice-ai-api
          envVarKey: RENDER_EXTERNAL_URL

  # 2. NestJS API (Backend)
  - type: web
    name: voice-ai-api
    env: node
    buildCommand: npm install --include=dev && npm run build --workspace=api
    startCommand: npm run start:prod --workspace=api
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: API_URL
        fromService:
          type: web
          name: voice-ai-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: WEB_URL
        fromService:
          type: web
          name: voice-ai-web
          envVarKey: RENDER_EXTERNAL_URL
      # To'liq ulanish — Render Postgres uchun eng ishonchli usul
      - key: DATABASE_URL
        fromDatabase:
          name: voice-ai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: voice-ai-redis
          property: connectionString
      - key: POSTGRES_DB
        fromDatabase:
          name: voice-ai-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: voice-ai-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: voice-ai-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: voice-ai-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: voice-ai-db
          property: port

  # 3. Python Worker (Ovoz generator)
  - type: worker
    name: voice-ai-worker
    env: python
    buildCommand: cd apps/worker && pip install -r requirements.txt
    startCommand: cd apps/worker && python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: REDIS_URL
        fromService:
          type: redis
          name: voice-ai-redis
          property: connectionString
      # API service'da bir marta saqlangan maxfiy kalitlarni workerga ulash:
      - key: AZURE_TTS_KEY
        fromService:
          type: web
          name: voice-ai-api
          envVarKey: AZURE_TTS_KEY
      - key: AZURE_TTS_REGION
        fromService:
          type: web
          name: voice-ai-api
          envVarKey: AZURE_TTS_REGION
      - key: S3_ACCESS_KEY
        fromService:
          type: web
          name: voice-ai-api
          envVarKey: S3_ACCESS_KEY
      - key: S3_SECRET_KEY
        fromService:
          type: web
          name: voice-ai-api
          envVarKey: S3_SECRET_KEY
      - key: S3_BUCKET
        fromService:
          type: web
          name: voice-ai-api
          envVarKey: S3_BUCKET
      - key: S3_REGION
        fromService:
          type: web
          name: voice-ai-api
          envVarKey: S3_REGION
      - key: S3_ENDPOINT
        fromService:
          type: web
          name: voice-ai-api
          envVarKey: S3_ENDPOINT

  # 4. Redis Xizmati
  - type: redis
    name: voice-ai-redis
    ipAllowList: [] # faqat ichki xizmatlar kira oladi
    plan: free

# 5. PostgreSQL Baza
databases:
  - name: voice-ai-db
    databaseName: voiceai
    user: voiceai
    plan: free
